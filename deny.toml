# cargo-deny configuration.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
yanked = "deny"
ignore = []

[licenses]
# Skip license checks for this crate itself (publish = false, no license field).
private = { ignore = true }
# Exactly the licenses the current dependency tree uses; extend as deps change.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
