[package]
name = "openrouter-chat-rust"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"

[dependencies]
rig-core = { version = "0.40", default-features = false, features = ["derive", "rustls"] }
rig-memory = "0.40"
schemars = { version = "1.2", features = ["derive"] }
async-trait = "0.1"
futures = "0.3"
reqwest = { version = "0.13", default-features = false, features = ["json", "query", "rustls"] }
governor = "0.10"
scraper = "0.27"
htmd = "0.5"
quick-xml = { version = "0.41", features = ["serialize"] }
url = { version = "2.5", features = ["serde"] }
toml = "1.1"
tracing = "0.1"
tempfile = "3.27"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Storage_FileSystem"] }
