# Copy this file to config.toml, then put secrets in .env.

[models]
chat_id = "openrouter/auto"
rank_id = "openrouter/auto"
summarize_id = "openrouter/auto"
chat_context_tokens = 12000

[search]
stage_budget_secs = 20
rank_timeout_secs = 20
per_backend_hit_cap = 5
model_output_bytes = 6144

[session]
log_directory = "sessions"
redact_credentials = true
redact_auth_headers = true

[fetch]
timeout_secs = 20
max_bytes = 2000000
max_chars = 50000
allowed_schemes = ["http", "https"]
allowed_media_types = ["text/html", "text/plain", "application/xhtml+xml", "application/json", "text/xml", "application/xml"]
redirect_limit = 5

# Key-free providers are enabled by default.
# Provider User-Agent values identify this project by its public repository URL.
[providers.duckduckgo]
enable = true
concurrency = 1
min_interval_ms = 1000
timeout_secs = 6
user_agent = "openrouter-chat-rust/0.1 (+https://github.com/nickth3man/rust-chat-agent)"

[providers.stract]
enable = true
concurrency = 1
min_interval_ms = 1000
